<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Consulta Amenazas UICN</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>

<body>

<h2>Consulta de Amenazas UICN</h2>
<table id="tabla" class="display" style="width:100%"></table>

<script>
Papa.parse("assets/iucn_threats_final2.csv", {
  download: true,
  header: true,
  complete: function(results) {
    $('#tabla').DataTable({
      data: results.data,
      columns: Object.keys(results.data[0]).map(function(key) {
        return { title: key, data: key };
      }),
      pageLength: 25
    });
  }
});
</script>

</body>
</html>
